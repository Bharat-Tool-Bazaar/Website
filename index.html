<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bharat Tool Bazaar | Coming Soon</title>
    <meta name="description" content="Connecting local hardware stores to nearby customers. Get tools & equipment delivered fast to commercial regions.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Elements for aesthetics -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="grid-overlay"></div>

    <!-- Main Content -->
    <main class="hero">
        <div class="container">
            <div class="hero-content fade-in-up">
                <div class="badge">�️ Tool Marketplace</div>
                <h1 class="title">Bharat Tool <span class="accent-text">Bazaar</span></h1>
                <p class="subtitle">
                    Browse and purchase hardware tools & equipment. Add items to your cart and checkout via WhatsApp for fast delivery to your commercial site.
                </p>
            </div>
            
            <!-- Products Section -->
            <section class="products-section">
                <h2 class="section-title">Available Tools</h2>
                <div class="products-grid" id="products-grid">
                    <!-- Products will be dynamically added here -->
                </div>
            </section>
            
            <!-- Cart Section -->
            <section class="cart-section">
                <div class="cart-container">
                    <h2 class="section-title">Your Cart</h2>
                    <div class="cart-content">
                        <div class="cart-items" id="cart-items">
                            <p class="empty-cart">Your cart is empty.</p>
                        </div>
                        <div class="cart-summary">
                            <div class="total-price" id="total-price">Total: ₹0</div>
                            <button class="checkout-btn" id="checkout-btn" disabled>
                                <i class="fa-brands fa-whatsapp"></i> Checkout via WhatsApp
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>

    <!-- Address Modal -->
    <div id="address-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Delivery Address</h3>
                <button class="close-modal" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="address-form">
                    <div class="form-group">
                        <label for="delivery-address">Please enter your delivery address:</label>
                        <textarea 
                            id="delivery-address" 
                            name="address" 
                            placeholder="Enter your complete delivery address including street, city, state, and pincode..."
                            required
                        ></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="cancel-btn" id="cancel-address">Cancel</button>
                        <button type="submit" class="submit-btn">Confirm & Send to WhatsApp</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
